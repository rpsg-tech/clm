# ═══════════════════════════════════════════════════════════════════════════════
# CLM Enterprise — Nginx Reverse Proxy Configuration
# Server: clm.rpsg.in | RHEL 9.x
# ═══════════════════════════════════════════════════════════════════════════════

# ── Rate Limiting Zones ──────────────────────────────────────────────────────
# Auth endpoints: strict rate limit (brute-force protection)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

# General API: fair rate limit
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/s;

# ── Upstream Definitions ─────────────────────────────────────────────────────
upstream clm_backend {
    server 127.0.0.1:3001;
    keepalive 64;
}

upstream clm_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# MinIO Upstreams
upstream minio_s3 {
    server 127.0.0.1:9000;
    keepalive 64;
}

upstream minio_console {
    server 127.0.0.1:9001;
    keepalive 32;
}

# ── Referral mapping (REMOVED: Too fragile for some browsers) ────────────────

# ── HTTP → HTTPS Redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name clm.rpsg.in _ ;

    # Let's Encrypt challenge (required for Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name clm.rpsg.in 10.40.4.110 _ ;

    # ── SSL Configuration ────────────────────────────────────────────────────
    # NOTE: These paths will be set by Certbot automatically.
    # Before Certbot runs, use self-signed certs or comment out SSL block.
    ssl_certificate     /etc/letsencrypt/live/clm.rpsg.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clm.rpsg.in/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/clm.rpsg.in/chain.pem;

    # TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # Note: X-Frame-Options, X-Content-Type-Options, X-XSS-Protection, and Referrer-Policy 
    # are defined globally in /etc/nginx/nginx.conf

    # ── Gzip Compression ─────────────────────────────────────────────────────
    # Defined globally in /etc/nginx/nginx.conf

    # ── Client Settings ──────────────────────────────────────────────────────
    client_max_body_size 50M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;

    # ── Proxy Defaults ───────────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # ── MinIO Global Asset Fallback (High Priority) ──────────────────────────
    # Catch assets requested at the root (/, /static, etc.) that belong to MinIO.
    # MinIO uses these specific paths in its generated HTML.
    location ~* ^/(styles/root-styles.css|Loader.svg|manifest.json|static/js/|static/css/|images/background-wave.*\.svg) {
        if ($minio_referer) {
            add_header X-CLM-Asset-Route "MinIO" always;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://minio_console;
            break;
        }
        # Otherwise, fall back to frontend
        add_header X-CLM-Asset-Route "Frontend" always;
        proxy_pass http://clm_frontend;
    }
    proxy_set_header X-Forwarded-Port $server_port;
    
    # Rewrite ANY internal redirect to use the external HTTPS domain
    proxy_redirect http://localhost:3000/ /;
    proxy_redirect http://127.0.0.1:3000/ /;
    proxy_redirect http://clm_frontend/ /;
    proxy_redirect ~^http://[^/]+(/?.*)$ https://$host$1;

    # Header sizes (for large JWTs / NextJS auth cookies)
    proxy_headers_hash_max_size 512;
    proxy_headers_hash_bucket_size 128;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 4 32k;

    # ── Backend API (/api/v1/*) ──────────────────────────────────────────────
    location /api/v1/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://clm_backend;
        proxy_set_header Connection "";

        # WebSocket support (for real-time features)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for long-running API calls (e.g., AI processing)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Auth endpoints — stricter rate limiting
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;

        proxy_pass http://clm_backend;
        proxy_set_header Connection "";
    }

    # Swagger docs (only if enabled)
    location /api/docs {
        proxy_pass http://clm_backend;
        proxy_set_header Connection "";
    }

    # ── Next.js Static Assets ────────────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://clm_frontend;
        proxy_set_header Connection "";
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── MinIO API (S3) ───────────────────────────────────────────────────────
    location /s3/ {
        # Allow large file uploads
        client_max_body_size 1000M;
        
        # Strip /s3 prefix before passing to MinIO
        rewrite ^/s3/(.*) /$1 break;
        
        proxy_pass http://minio_s3;
        
        # Security & Proxy Headers
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /s3;
        proxy_set_header X-NginX-Proxy true;

        # CRITICAL: Catch redirects from MinIO S3 (port 9000) to Console (port 9001)
        # and rewrite them to the public HTTPS URL.
        proxy_redirect http://127.0.0.1:9001/ https://10.40.4.110/minio-console/;
        proxy_redirect http://localhost:9001/ https://10.40.4.110/minio-console/;
        proxy_redirect http://10.40.4.110:9001/ https://10.40.4.110/minio-console/;
        proxy_redirect / /s3/;

        proxy_connect_timeout 300;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        chunked_transfer_encoding off;
    }

    # ── MinIO Console (UI) ───────────────────────────────────────────────────
    location /minio-console/ {
        add_header X-CLM-Nginx "Pro-V3" always;
        
        # Strip /minio-console prefix
        rewrite ^/minio-console/(.*) /$1 break;
        
        proxy_pass http://minio_console;
        
        # Security & Proxy Headers
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /minio-console;
        proxy_set_header X-NginX-Proxy true;

        # Catch internal redirects
        proxy_redirect http://127.0.0.1:9001/ https://10.40.4.110/minio-console/;
        proxy_redirect http://localhost:9001/ https://10.40.4.110/minio-console/;
        proxy_redirect / /minio-console/;

        proxy_connect_timeout 300;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        chunked_transfer_encoding off;
    }


    # Standard redirects for clean URLs
    location = /minio-console { return 301 $scheme://$http_host/minio-console/; }
    location = /s3            { return 301 $scheme://$http_host/s3/; }

    # ── CLM Backend (API) ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://clm_backend;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Rate limiting (Auth protection handled at zone level)
        limit_req zone=api_limit burst=100 nodelay;

        # Timeouts for long-running AI tasks
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # ── Frontend (everything else) ───────────────────────────────────────────
    location / {
        proxy_pass http://clm_frontend;
        proxy_set_header Connection "";

        # WebSocket support (Next.js HMR — only useful if dev, but harmless)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Health Check Endpoint (Nginx-level) ──────────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── Block common attack paths ────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* ^/(wp-admin|wp-login|xmlrpc|phpmyadmin|admin\.php) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/clm-access.log combined buffer=512k flush=1m;
    error_log  /var/log/nginx/clm-error.log warn;
}
