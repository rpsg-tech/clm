# ═══════════════════════════════════════════════════════════════════════════════
# CLM Enterprise — Nginx Reverse Proxy Configuration
# Server: clm.rpsg.in | RHEL 9.x
# ═══════════════════════════════════════════════════════════════════════════════

# ── Rate Limiting Zones ──────────────────────────────────────────────────────
# Auth endpoints: strict rate limit (brute-force protection)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

# General API: fair rate limit
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/s;

# ── Upstream Definitions ─────────────────────────────────────────────────────
upstream clm_backend {
    server 127.0.0.1:3001;
    keepalive 64;
}

upstream clm_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# MinIO Upstreams
upstream minio_s3 {
    server 127.0.0.1:9000;
    keepalive 64;
}

upstream minio_console {
    server 127.0.0.1:9001;
    keepalive 32;
}

# ── HTTP → HTTPS Redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name clm.rpsg.in _ ;

    # Let's Encrypt challenge (required for Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name clm.rpsg.in _ ;

    # ── SSL Configuration ────────────────────────────────────────────────────
    # NOTE: These paths will be set by Certbot automatically.
    # Before Certbot runs, use self-signed certs or comment out SSL block.
    ssl_certificate     /etc/letsencrypt/live/clm.rpsg.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clm.rpsg.in/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/clm.rpsg.in/chain.pem;

    # TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # Note: X-Frame-Options, X-Content-Type-Options, X-XSS-Protection, and Referrer-Policy 
    # are defined globally in /etc/nginx/nginx.conf

    # ── Gzip Compression ─────────────────────────────────────────────────────
    # Defined globally in /etc/nginx/nginx.conf

    # ── Client Settings ──────────────────────────────────────────────────────
    client_max_body_size 50M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;

    # ── Proxy Defaults ───────────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    
    # Rewrite ANY internal redirect to use the external HTTPS domain
    proxy_redirect http://localhost:3000/ /;
    proxy_redirect http://127.0.0.1:3000/ /;
    proxy_redirect http://clm_frontend/ /;
    proxy_redirect ~^http://[^/]+(/?.*)$ https://$host$1;

    # Header sizes (for large JWTs / NextJS auth cookies)
    proxy_headers_hash_max_size 512;
    proxy_headers_hash_bucket_size 128;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 4 32k;

    # ── Backend API (/api/v1/*) ──────────────────────────────────────────────
    location /api/v1/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://clm_backend;
        proxy_set_header Connection "";

        # WebSocket support (for real-time features)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for long-running API calls (e.g., AI processing)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Auth endpoints — stricter rate limiting
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;

        proxy_pass http://clm_backend;
        proxy_set_header Connection "";
    }

    # Swagger docs (only if enabled)
    location /api/docs {
        proxy_pass http://clm_backend;
        proxy_set_header Connection "";
    }

    # ── Next.js Static Assets ────────────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://clm_frontend;
        proxy_set_header Connection "";
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── MinIO API (/s3/*) ────────────────────────────────────────────────────
    location /s3 {
        # Redirect /s3 to /s3/
        if ($request_uri ~* ^/s3$) { return 301 $scheme://$http_host$request_uri/; }
        
        # Allow large file uploads
        client_max_body_size 1000M;
        
        # Strip /s3 prefix
        rewrite ^/s3/(.*) /$1 break;
        
        proxy_pass http://minio_s3;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Correct internal redirects
        proxy_redirect / /s3/;
        
        proxy_connect_timeout 300;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        chunked_transfer_encoding off;
    }

    # ── MinIO Console (/minio-console/*) ─────────────────────────────────────
    location /minio-console {
        # Redirect /minio-console to /minio-console/
        if ($request_uri ~* ^/minio-console$) { return 301 $scheme://$http_host$request_uri/; }

        # Strip /minio-console prefix
        rewrite ^/minio-console/(.*) /$1 break;
        
        proxy_pass http://minio_console;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Essential for subpath support
        proxy_redirect / /minio-console/;
        
        proxy_connect_timeout 300;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        chunked_transfer_encoding off;
    }

    # ── MinIO Console Assets (Catch-all for static resources) ────────────────
    # If the browser requests a static file that wasn't found in clm-frontend,
    # and it looks like it belongs to MinIO, we need to handle it.
    # However, MinIO uses /static/ in its internal HTML. 
    # To fix this without breaking CLM, we rely on the MINIO_BROWSER_REDIRECT_URL fix.

    # ── Frontend (everything else) ───────────────────────────────────────────
    location / {
        proxy_pass http://clm_frontend;
        proxy_set_header Connection "";

        # WebSocket support (Next.js HMR — only useful if dev, but harmless)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Health Check Endpoint (Nginx-level) ──────────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── Block common attack paths ────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* ^/(wp-admin|wp-login|xmlrpc|phpmyadmin|admin\.php) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/clm-access.log combined buffer=512k flush=1m;
    error_log  /var/log/nginx/clm-error.log warn;
}
