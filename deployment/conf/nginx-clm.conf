# ═══════════════════════════════════════════════════════════════════════════════
# CLM Enterprise — Nginx Reverse Proxy Configuration
# Server: clm.rpsg.in | RHEL 9.x
# ═══════════════════════════════════════════════════════════════════════════════

# ── Rate Limiting Zones ──────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/s;

# ── Upstream Definitions ─────────────────────────────────────────────────────
upstream clm_backend {
    server 127.0.0.1:3001;
    keepalive 64;
}

upstream clm_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream minio_s3 {
    server 127.0.0.1:9000;
    keepalive 64;
}

upstream minio_console {
    server 127.0.0.1:9001;
    keepalive 32;
}

# ── Referral mapping ─────────────────────────────────────────────────────────
map $http_referer $is_minio_ui {
    default 0;
    ~*/minio-console/ 1;
}

# ── HTTP Redirect ───────────────────────────────────────────────────────────
server {

    listen 80;
    listen [::]:80;

    server_name clm.rpsg.in 10.40.4.110 _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }

}

# ── HTTPS Server ────────────────────────────────────────────────────────────
server {

    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;

    server_name clm.rpsg.in 10.40.4.110 _;

    # ── SSL Configuration ───────────────────────────────────────────────────
    ssl_certificate /etc/letsencrypt/live/clm.rpsg.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clm.rpsg.in/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/clm.rpsg.in/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security Headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Client Settings ─────────────────────────────────────────────────────
    client_max_body_size 2000M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;

    # ── Proxy Defaults ──────────────────────────────────────────────────────
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # ── Fix Large JWT Headers (Login Fix) ───────────────────────────────────
    proxy_buffer_size 512k;
    proxy_buffers 16 512k;
    proxy_busy_buffers_size 512k;
    large_client_header_buffers 8 128k;

    # ── Redirect Fixes ──────────────────────────────────────────────────────
    proxy_redirect http://localhost:3000/ /;
    proxy_redirect http://127.0.0.1:3000/ /;
    proxy_redirect http://localhost:3001/ /;
    proxy_redirect http://127.0.0.1:3001/ /;
    proxy_redirect http://localhost:9001/ /minio-console/;
    proxy_redirect http://127.0.0.1:9001/ /minio-console/;
    proxy_redirect ~^http://[^/]+(/?.*)$ https://$host$1;

    # ── MinIO Static Assets ─────────────────────────────────────────────────
    location ^~ /static/  { proxy_pass http://minio_console; proxy_set_header Host $http_host; }
    location ^~ /styles/  { proxy_pass http://minio_console; proxy_set_header Host $http_host; }
    location ^~ /images/  { proxy_pass http://minio_console; proxy_set_header Host $http_host; }
    location ^~ /favicon.ico { proxy_pass http://minio_console; proxy_set_header Host $http_host; }
    location ^~ /logo.svg { proxy_pass http://minio_console; proxy_set_header Host $http_host; }
    location ^~ /manifest.json { proxy_pass http://minio_console; proxy_set_header Host $http_host; }
    location ^~ /Loader.svg { proxy_pass http://minio_console; proxy_set_header Host $http_host; }

    # ── MinIO S3 API ────────────────────────────────────────────────────────
    location /s3/ {
        rewrite ^/s3/(.*) /$1 break;
        proxy_pass http://minio_s3;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Prefix /s3;
        proxy_redirect / /s3/;
    }

    # ── MinIO Console ───────────────────────────────────────────────────────
    location /minio-console/ {
        rewrite ^/minio-console/(.*) /$1 break;
        proxy_pass http://minio_console;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Prefix /minio-console;
        proxy_redirect / /minio-console/;
    }

    # ── Backend API ─────────────────────────────────────────────────────────
    location /api/v1/ {

        if ($is_minio_ui) {
            proxy_pass http://minio_console;
            break;
        }

        limit_req zone=api_limit burst=100 nodelay;

        proxy_pass http://clm_backend;
        proxy_read_timeout 300s;
        proxy_set_header Connection "";

        add_header X-CLM-API-Route "Backend" always;
    }

    # ── NestJS Uploads ──────────────────────────────────────────────────────
    location /api/assets/ {
        alias /opt/clm/app/apps/backend/uploads/;
        expires 30d;
    }

    # ── Next.js Static ──────────────────────────────────────────────────────
    location /_next/static/ {
        alias /opt/clm/app/apps/user-app/.next/static/;
        expires 365d;
        access_log off;
    }

    location /public/ {
        alias /opt/clm/app/apps/user-app/public/;
        expires 30d;
    }

    location = /minio-console { return 301 https://$http_host/minio-console/; }
    location = /s3 { return 301 https://$http_host/s3/; }

    # ── Frontend ────────────────────────────────────────────────────────────
    location / {
        proxy_pass http://clm_frontend;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Security ────────────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location /nginx-health {
        access_log off;
        return 200 "OK\n";
    }

    # ── Logging ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/clm-access.log combined buffer=512k flush=1m;
    error_log  /var/log/nginx/clm-error.log warn;

}