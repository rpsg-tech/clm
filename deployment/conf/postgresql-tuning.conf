# ═══════════════════════════════════════════════════════════════════════════════
# CLM Enterprise — PostgreSQL 16 Performance Tuning
# Server: 64 GB RAM, 16 vCPU, SSD storage
# Include via: include_dir = 'conf.d' in postgresql.conf
# ═══════════════════════════════════════════════════════════════════════════════

# ── Connection Settings ──────────────────────────────────────────────────────
listen_addresses = 'localhost'
max_connections = 200
superuser_reserved_connections = 3

# ── Memory ───────────────────────────────────────────────────────────────────
shared_buffers = 16GB                    # 25% of 64GB RAM
effective_cache_size = 48GB              # 75% of 64GB RAM
work_mem = 64MB                          # Per-operation sort/hash memory
maintenance_work_mem = 2GB               # VACUUM, CREATE INDEX, ALTER TABLE
huge_pages = try                         # Use if available (large RAM benefit)

# ── WAL (Write-Ahead Log) ───────────────────────────────────────────────────
wal_buffers = 64MB
max_wal_size = 4GB
min_wal_size = 1GB
checkpoint_completion_target = 0.9
wal_compression = lz4

# ── Query Planner ────────────────────────────────────────────────────────────
random_page_cost = 1.1                   # SSD tuning (default 4.0 is for HDD)
effective_io_concurrency = 200           # SSD parallel I/O (default 1)
default_statistics_target = 100

# ── Parallelism ──────────────────────────────────────────────────────────────
max_worker_processes = 16                # Match vCPUs
max_parallel_workers = 16                # Match vCPUs
max_parallel_workers_per_gather = 4      # Per-query parallelism
max_parallel_maintenance_workers = 4     # Parallel VACUUM, INDEX

# ── Logging ──────────────────────────────────────────────────────────────────
log_min_duration_statement = 500         # Log queries slower than 500ms
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0                       # Log ALL temp file usage
log_autovacuum_min_duration = 0          # Log all autovacuum actions
log_line_prefix = '%t [%p] %q%u@%d '

# ── Autovacuum ───────────────────────────────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_cost_limit = 1000      # Faster vacuum on fast storage

# ── Misc ─────────────────────────────────────────────────────────────────────
timezone = 'Asia/Kolkata'
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all
